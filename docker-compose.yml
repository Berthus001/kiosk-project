version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: kiosk-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - kiosk-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kiosk-backend
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/kiosk_db
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - kiosk-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kiosk-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - kiosk-network

volumes:
  mongodb_data:

networks:
  kiosk-network:
    driver: bridge
